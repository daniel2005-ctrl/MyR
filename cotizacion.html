<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcula tu cuota inicial</title>
    <link rel="stylesheet" href="cotizacion.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Calcula tu cuota inicial</h1>
        <p class="subtext">Porcentaje de la cuota: <br> 30% sobre el valor del apartamento</p>
        
        <label class="switch">
            <input type="checkbox" id="subsidio">
            <span class="slider"></span>
        </label>
        <span class="label-text">¿Vas a utilizar subsidio de vivienda?</span>
        
        <div class="form-group">
            <label for="vivienda">Selecciona tu vivienda:</label>
            <select id="vivienda" class="form-control">
                <option value="" disabled selected>Selecciona una opción</option>
                <option value="myr72_70mtr^2" data-precio="200000000">MYR72 - 70m²</option>
                <option value="myr72_54mtrs^2" data-precio="150000000">MYR72 - 54m²</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="valor">Valor total de la vivienda:</label>
            <input type="text" id="valor" readonly>
        </div>

        <div class="form-group">
            <label for="cuota-inicial">Valor cuota inicial (30% del valor total):</label>
            <input type="text" id="cuota-inicial" readonly>
        </div>

        <div class="form-group">
            <label for="separacion">Separación (10% de la cuota inicial):</label>
            <input type="text" id="separacion" readonly>
        </div>

        <div class="form-group">
            <label for="meses">Plazo para pagar la cuota inicial (meses):</label>
            <select id="meses" class="form-control">
                <option value="12">12 meses</option>
                <option value="24">24 meses</option>
                <option value="36">36 meses</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="ingresos">Valor de ingresos promedio mensual:</label>
            <input type="number" id="ingresos">
        </div>

        <div class="form-group">
            <label for="cuota-mensual">Valor cuota mensual a pagar:</label>
            <input type="text" id="cuota-mensual" readonly>
        </div>
        
        <script>
            document.getElementById("vivienda").addEventListener("change", calcularCuotas);
            document.getElementById("meses").addEventListener("change", calcularCuotas);
            document.getElementById("ingresos").addEventListener("input", calcularCuotas);

            function calcularCuotas() {
                let selectedOption = document.getElementById("vivienda").options[document.getElementById("vivienda").selectedIndex];
                let precio = parseFloat(selectedOption.getAttribute("data-precio"));
                let meses = parseInt(document.getElementById("meses").value);
                let ingresoMensual = parseFloat(document.getElementById("ingresos").value) || 0;
                
                if (!isNaN(precio) && !isNaN(meses) && meses > 0) {
                    let cuotaInicial = precio * 0.30;
                    let separacion = cuotaInicial * 0.10;
                    let deudaRestante = cuotaInicial - separacion;
                    let cuotaMensual = deudaRestante / meses;
                    
                    document.getElementById("valor").value = new Intl.NumberFormat("es-CO", { style: "currency", currency: "COP" }).format(precio);
                    document.getElementById("cuota-inicial").value = new Intl.NumberFormat("es-CO", { style: "currency", currency: "COP" }).format(cuotaInicial);
                    document.getElementById("separacion").value = new Intl.NumberFormat("es-CO", { style: "currency", currency: "COP" }).format(separacion);
                    document.getElementById("cuota-mensual").value = new Intl.NumberFormat("es-CO", { style: "currency", currency: "COP" }).format(cuotaMensual);
                }
            }
        </script>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
