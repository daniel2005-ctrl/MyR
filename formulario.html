<!DOCTYPE html>
<html lang="es"> 
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Formulario en Tarjeta</title> 
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Evitar barra de desplazamiento innecesaria */
        body {
            overflow-x: hidden;
            background-color: #f8f9fa;
        }

        /* Centrar y mejorar el formulario */
        .contenedor-formulario {
            position: fixed;
            top: 50%;
            left: 30%;
            transform: translate(-50%, -50%);
            width: 30rem;
            max-height: 90vh;
            overflow-y: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            border: 5px solid #ffc107;
        }

        /* Mejorar botón */
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body> 

    <div class="contenedor-formulario">
        <h2 class="text-center mb-4">Formulario de Contacto</h2> 
                
        <form action="procesar_formulario.php" method="POST">
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre Completo</label> 
                <input type="text" id="nombre" name="nombre" class="form-control">
            </div>
            
            <div class="mb-3">
                <label for="telefono" class="form-label">Teléfono</label> 
                <input type="tel" id="telefono" name="telefono" class="form-control">
            </div>
            
            <div class="mb-3">
                <label for="tipo_documento" class="form-label">Tipo de Documento</label> 
                <select id="tipo_documento" name="tipo_documento" class="form-control"> 
                    <option value="cedula">Cédula</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label for="numero_documento" class="form-label">Número de Documento</label> 
                <input type="text" id="numero_documento" name="numero_documento" class="form-control">
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico</label> 
                <input type="email" id="email" name="email" class="form-control">
            </div>

            <div class="mb-3">
                <label for="proyecto" class="form-label">Selecciona un proyecto:</label>
                <select id="proyecto" name="proyecto" class="form-select" required>
                    <option value= "" selected disabled>Elige un proyecto</option>
                    <option value="1">MYR72</option>
                    <option value="6">Altos De Rincon De Varsovia</option>
                    <option value="7">Prados De Varsovia</option>
                    <option value="8">Rincon De Varsovia</option>
                </select>
            </div>

            <button type="submit">Enviar</button> 
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
